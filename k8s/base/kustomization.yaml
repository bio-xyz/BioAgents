apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - worker-deep-research
  - worker-chat
  - worker-heavy
  - worker-scheduled
  - keda

# `includeSelectors: false` keeps Deployment selectors tight (just
# `app.kubernetes.io/name: <worker>`). Organisational labels stay out of
# selectors, which would otherwise be immutable on update.
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: bioagents
      app.kubernetes.io/managed-by: kustomize
