apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-deep-research
  labels:
    app.kubernetes.io/name: worker-deep-research
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  progressDeadlineSeconds: 28800
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 100%
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: worker-deep-research
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker-deep-research
        app.kubernetes.io/component: worker
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
    spec:
      terminationGracePeriodSeconds: 28800
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-pull
      tolerations:
        - key: workload
          operator: Equal
          value: worker
          effect: NoSchedule
      containers:
        - name: worker
          image: ghcr.io/bio-xyz/bioagents:placeholder
          command: ["bun", "run", "src/worker.ts"]
          ports:
            - name: health
              containerPort: 9000
          env:
            - name: ENABLE_DEEP_RESEARCH_WORKER
              value: "true"
            - name: ENABLE_CHAT_WORKER
              value: "false"
            - name: ENABLE_FILE_PROCESS_WORKER
              value: "false"
            - name: ENABLE_PAPER_GENERATION_WORKER
              value: "false"
            - name: ENABLE_MESSAGE_SWEEPER_WORKER
              value: "false"
            - name: WORKER_HEALTH_PORT
              value: "9000"
          envFrom:
            - configMapRef:
                name: worker-config
            - secretRef:
                name: worker-secrets
          # Burstable QoS: no memory limit so an OOMKill can't break the
          # in-flight-job drain guarantee. CPU limit stays (throttles, not kills).
          # `safe-to-evict: false` annotation prevents autoscaler scale-down
          # mid-job; eviction under genuine node pressure is graceful (SIGTERM).
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "1000m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          startupProbe:
            httpGet:
              path: /health/ready
              port: health
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: health
            periodSeconds: 10
            failureThreshold: 3
          # Lenient liveness: Bun.serve shares the event loop with BullMQ.
          # 5s timeout + 10 failures × 30s = 300s budget tolerates legitimate
          # event-loop pressure (large LLM responses, OCR bursts) without
          # restarting mid-job. BullMQ's own stall detection handles deadlock.
          livenessProbe:
            httpGet:
              path: /health/live
              port: health
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
