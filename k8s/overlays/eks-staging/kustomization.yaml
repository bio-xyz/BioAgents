apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: bioagents-staging

# Namespace + ResourceQuota are owned by Terraform (cluster/main.tf) so the
# namespace-scoped deployer role doesn't need cluster-scope perms to create
# them, and the deploy actor can't raise its own quota ceiling.
resources:
  - ../../base

images:
  - name: ghcr.io/bio-xyz/bioagents
    newTag: dev

configMapGenerator:
  - name: worker-config
    envs:
      - config.env

secretGenerator:
  - name: worker-secrets
    envs:
      - secret.env
    # KEDA's TriggerAuthentication references this Secret by name; Kustomize
    # doesn't rewrite CRD field refs, so we keep the name stable.
    options:
      disableNameSuffixHash: true
  - name: ghcr-pull
    type: kubernetes.io/dockerconfigjson
    files:
      - .dockerconfigjson=pull-secret.dockerconfigjson
    options:
      disableNameSuffixHash: true

patches:
  - path: scaledobject-patches.yaml
