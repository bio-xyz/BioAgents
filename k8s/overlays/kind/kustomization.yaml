apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: bioagents

resources:
  - namespace.yaml
  - redis.yaml
  - ../../base

images:
  - name: ghcr.io/bio-xyz/bioagents
    newTag: dev

configMapGenerator:
  - name: worker-config
    envs:
      - config.env

secretGenerator:
  - name: worker-secrets
    envs:
      - secret.env
    # KEDA's TriggerAuthentication references this secret by name and Kustomize
    # doesn't know about the CRD schema, so hash-rewrite would break the ref.
    options:
      disableNameSuffixHash: true
  # Pull secret built from a kubectl-style docker-config json placed at
  # pull-secret.dockerconfigjson. CI renders it from $GHCR_PAT at deploy time.
  - name: ghcr-pull
    type: kubernetes.io/dockerconfigjson
    files:
      - .dockerconfigjson=pull-secret.dockerconfigjson
    options:
      disableNameSuffixHash: true

# Local kind: scale everything down.
patches:
  - target:
      kind: ScaledObject
    patch: |
      - op: replace
        path: /spec/maxReplicaCount
        value: 2
