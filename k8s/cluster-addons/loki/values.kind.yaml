# kind override: single-binary, filesystem storage, no S3, 1 replica per role.
deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  persistence:
    enabled: false   # ephemeral; kind is for smoke tests only

loki:
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

# Disable the read/write/backend deployments and gateway in SingleBinary mode.
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
gateway:
  enabled: false

chunksCache:
  enabled: false
resultsCache:
  enabled: false
