# EKS staging override.
#
# Terraform injects the dynamic bits (serviceAccount IRSA annotation,
# loki.storage.bucketNames, loki.storage.s3.region) via the helm_release
# `values = [..., yamlencode({...})]` layering in
# infra/terraform/modules/observability/main.tf. Everything else lives here.

# Smaller replicas than prod.
backend:
  replicas: 2
read:
  replicas: 2
write:
  replicas: 2
gateway:
  replicas: 1
