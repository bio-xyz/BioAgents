# EKS staging override: S3 chunks via IRSA.
# Fill PLACEHOLDER values from the Terraform output (bucket name + role ARN).

serviceAccount:
  create: true
  name: loki
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::PLACEHOLDER_ACCOUNT:role/bioagents-loki-staging

loki:
  storage:
    type: s3
    bucketNames:
      chunks: bioagents-loki-staging
      ruler: bioagents-loki-staging
      admin: bioagents-loki-staging
    s3:
      region: us-east-1
      s3ForcePathStyle: false
      insecure: false

# Smaller replicas than prod.
backend:
  replicas: 2
read:
  replicas: 2
write:
  replicas: 2
gateway:
  replicas: 1
