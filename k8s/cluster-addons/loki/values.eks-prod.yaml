# EKS prod override.
#
# Terraform injects the dynamic bits (serviceAccount IRSA annotation,
# loki.storage.bucketNames, loki.storage.s3.region) via the helm_release
# values layering in infra/terraform/modules/observability/main.tf.

loki:
  limits_config:
    # Retain prod logs longer than staging.
    retention_period: 2160h # 90 days
    max_query_lookback: 2160h
    ingestion_rate_mb: 32
    ingestion_burst_size_mb: 64
