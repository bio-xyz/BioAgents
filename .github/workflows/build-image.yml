name: Build Image (GHCR)

# Builds the BioAgents image and pushes to GHCR.
# Tags: :sha-<short> (immutable) plus :dev or :main per branch, plus :v* on tags.
# Used by deploy-workers.yml for EKS rollouts.

on:
  push:
    branches: [dev, main]
    tags: ['v*']
    paths:
      - 'src/**'
      - 'client/**'
      - 'Dockerfile'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/build-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/bioagents

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          set -eu
          TAGS="${IMAGE}:sha-${{ steps.meta.outputs.short_sha }}"
          if [[ "${GITHUB_REF}" == "refs/heads/dev" ]]; then
            TAGS="${TAGS},${IMAGE}:dev"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            TAGS="${TAGS},${IMAGE}:main"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAGS="${TAGS},${IMAGE}:${GITHUB_REF_NAME}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
